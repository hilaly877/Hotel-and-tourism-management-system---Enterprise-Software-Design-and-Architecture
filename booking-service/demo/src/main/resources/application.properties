# Server Configuration
server.port=8083

# Application Name
spring.application.name=booking-service

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/hotel_booking_db
spring.datasource.username=postgres
spring.datasource.password=************
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Other Microservice URLs (Guest Service & Room Service)
services.guest-service.url=http://localhost:8081
services.room-service.url=http://localhost:8082

# Logging
logging.level.com.hotel=DEBUG
